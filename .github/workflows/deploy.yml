# ───────────────────────────────────────────────────────────────
#  NexCall — Deploy to Render (or any Node.js host)
#  Triggers on push to main. Uses Render Deploy Hook.
# ───────────────────────────────────────────────────────────────
name: Deploy Server

on:
  push:
    branches: [main]

jobs:
  deploy:
    name: 🚀 Deploy to Render
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Render Deploy
        run: |
          curl -X POST "${{ secrets.RENDER_DEPLOY_HOOK }}"
        # ─── Setup ─────────────────────────────────
        # 1. Go to Render.com → New Web Service → connect your repo
        # 2. Copy the Deploy Hook URL from Settings
        # 3. In GitHub repo → Settings → Secrets → New secret:
        #    Name:  RENDER_DEPLOY_HOOK
        #    Value: <your deploy hook URL>
