# ───────────────────────────────────────────────────────────────
#  NexCall — CI: lint, test, and validate on every push / PR
# ───────────────────────────────────────────────────────────────
name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  build:
    name: 🧪 Build & Validate
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [18, 20]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Validate server starts
        run: |
          # Start the server in HTTP mode and check it responds
          USE_HTTPS=false node server.js &
          SERVER_PID=$!
          sleep 3
          # Health check
          curl -f http://localhost:3000/ || exit 1
          kill $SERVER_PID
        env:
          USE_HTTPS: 'false'

  android-build:
    name: 📱 Build Android APK
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm ci

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Fix Gradle permission
        run: chmod +x android/gradlew

      - name: Build debug APK
        working-directory: android
        run: ./gradlew assembleDebug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: nexcall-debug-apk
          path: android/app/build/outputs/apk/debug/*.apk
          retention-days: 14
